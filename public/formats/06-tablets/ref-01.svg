<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <rect width="400" height="280" fill="#0C0A06"/>

  <!-- Label -->
  <text x="20" y="22" font-family="monospace" font-size="7" fill="#22d3ee" letter-spacing="3" opacity="0.7">FIG. 06 — TABLET FORMAT</text>
  <line x1="20" y1="28" x2="380" y2="28" stroke="#22d3ee" stroke-width="0.4" opacity="0.2"/>

  <!-- Blister pack card -->
  <rect x="60" y="42" width="240" height="170" rx="6" fill="#110d08" stroke="#9ca3af" stroke-width="0.5" opacity="0.4"/>

  <!-- Foil fold lines -->
  <line x1="60" y1="90"  x2="300" y2="90"  stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  <line x1="60" y1="140" x2="300" y2="140" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  <line x1="60" y1="190" x2="300" y2="190" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  <line x1="133" y1="42" x2="133" y2="212" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  <line x1="200" y1="42" x2="200" y2="212" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>
  <line x1="267" y1="42" x2="267" y2="212" stroke="#ffffff" stroke-width="0.3" opacity="0.08"/>

  <!-- Row 1 tablets -->
  <ellipse cx="97"  cy="66" rx="24" ry="15" fill="#D4851E" opacity="0.85"/>
  <ellipse cx="97"  cy="66" rx="18" ry="10" fill="#E8971F" opacity="0.6"/>
  <ellipse cx="167" cy="66" rx="24" ry="15" fill="#D4851E" opacity="0.85"/>
  <ellipse cx="167" cy="66" rx="18" ry="10" fill="#E8971F" opacity="0.6"/>
  <ellipse cx="237" cy="66" rx="24" ry="15" fill="#D4851E" opacity="0.85"/>
  <ellipse cx="237" cy="66" rx="18" ry="10" fill="#E8971F" opacity="0.6"/>

  <!-- Row 2 tablets -->
  <ellipse cx="97"  cy="116" rx="24" ry="15" fill="#52C046" opacity="0.8"/>
  <ellipse cx="97"  cy="116" rx="18" ry="10" fill="#66D458" opacity="0.5"/>
  <ellipse cx="167" cy="116" rx="24" ry="15" fill="#D4851E" opacity="0.85"/>
  <ellipse cx="167" cy="116" rx="18" ry="10" fill="#E8971F" opacity="0.6"/>
  <!-- empty blister — popped -->
  <ellipse cx="237" cy="116" rx="24" ry="15" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.3"/>

  <!-- Row 3 tablets -->
  <ellipse cx="97"  cy="166" rx="24" ry="15" fill="#D4851E" opacity="0.85"/>
  <ellipse cx="97"  cy="166" rx="18" ry="10" fill="#E8971F" opacity="0.6"/>
  <!-- empty -->
  <ellipse cx="167" cy="166" rx="24" ry="15" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="237" cy="166" rx="24" ry="15" fill="#52C046" opacity="0.8"/>
  <ellipse cx="237" cy="166" rx="18" ry="10" fill="#66D458" opacity="0.5"/>

  <!-- Tablets popped out (floating) -->
  <ellipse cx="340" cy="90"  rx="18" ry="10" fill="#D4851E" opacity="0.8" transform="rotate(-20 340 90)"/>
  <ellipse cx="355" cy="130" rx="18" ry="10" fill="#52C046" opacity="0.75" transform="rotate(15 355 130)"/>
  <ellipse cx="335" cy="165" rx="18" ry="10" fill="#D4851E" opacity="0.65" transform="rotate(-8 335 165)"/>

  <!-- Brand label strip -->
  <rect x="60" y="218" width="240" height="46" rx="4" fill="#0a0805" stroke="#22d3ee" stroke-width="0.6" opacity="0.5"/>
  <text x="180" y="234" text-anchor="middle" font-family="monospace" font-size="6.5" fill="#22d3ee" letter-spacing="2.5" opacity="0.9">SOIL CREST NATURALS</text>
  <text x="180" y="249" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.95" font-style="italic">Daily Health Mix</text>
  <text x="180" y="260" text-anchor="middle" font-family="monospace" font-size="5.5" fill="#9ca3af" letter-spacing="1.5">WHOLE-FOOD TABLETS · 90 COUNT · 4–6 PER SERVING</text>

  <!-- Corner detail -->
  <text x="380" y="275" text-anchor="end" font-family="monospace" font-size="6" fill="#22d3ee" opacity="0.3">PHASE 3</text>
</svg>
